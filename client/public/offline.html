<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sin conexión — Caliro</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: #F5F2EE;
  color: #111;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.wrap { text-align: center; max-width: 320px; }
.logo {
  font-family: Georgia, serif;
  font-style: italic;
  font-size: 32px;
  color: #22c55e;
  margin-bottom: 24px;
}
h1 {
  font-family: Georgia, serif;
  font-style: italic;
  font-size: 22px;
  font-weight: 400;
  margin-bottom: 8px;
}
p {
  font-size: 13px;
  color: #807c74;
  line-height: 1.6;
  margin-bottom: 24px;
}
button {
  background: #111;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Caliro</div>
  <h1>Sin conexión</h1>
  <p>No hay conexión a internet. Tus datos se cargarán cuando vuelvas a tener red.</p>
  <button onclick="location.reload()">Reintentar</button>
</div>
</body>
</html>
