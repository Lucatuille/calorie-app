<!--
  Fuente para Android adaptive icons (purpose: "maskable").
  Padding ~25% en cada lado: la C ocupa el 50% central del canvas.
  Cualquier máscara de Android (círculo, squircle, teardrop, etc) cropea
  agresivamente; el safe zone oficial es solo el 66% central. Aquí dejo
  margen extra para garantizar que la C entera sobrevive a cualquier máscara.
  Sin esquinas redondeadas en el background (las añade Android).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#F5F2EE"/>
  <g transform="translate(50 50) scale(0.681) translate(-50 -50)">
    <path d="M71 29 A30 30 0 1 0 71 71"
          stroke="#111111"
          stroke-width="11"
          fill="none"
          stroke-linecap="round"/>
    <circle cx="81" cy="50" r="6.5" fill="#22c55e"/>
  </g>
</svg>
