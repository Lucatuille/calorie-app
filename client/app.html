<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Caliro — La app de nutrición que aprende cómo comes tú</title>
    <meta name="description" content="Caliro es una app gratuita de seguimiento calórico con inteligencia artificial. Registra tus comidas, analiza fotos con IA y sigue tu progreso nutricional. Gratis en caliro.dev" />
    <meta name="keywords" content="seguimiento calorico, app calorias, contar calorias, dieta, nutricion, ia calorias, caliro" />
    <meta name="google-site-verification" content="7M6oLzfYaBAnQYXVLzmDetdD27nQfliCpcYYXrDJ0jA" />
    <link rel="canonical" href="https://caliro.dev/" />
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Caliro",
      "description": "App de seguimiento calórico con inteligencia artificial",
      "url": "https://caliro.dev",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      }
    }
    </script>
    <!-- Analytics -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="0ea8f133-f719-429d-8876-b1d4a901c556"></script>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F5F2EE">
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#0f0f0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Caliro">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <!-- Fondo inmediato antes de que cargue el CSS — elimina el flash blanco en iOS PWA -->
    <style>
      html { background: #F5F2EE; }
      [data-theme="dark"] html, html[data-theme="dark"] { background: #0f0f0f; }
      @media (prefers-color-scheme: dark) {
        html:not([data-theme="light"]) { background: #0f0f0f; }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <script>
      const t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
      // En web: si la app se sirve fuera de /app (p.ej. cache antiguo de PWA), redirigir.
      // En Capacitor nativo: el protocolo es capacitor:// y el path es /, no redirigir.
      var isCapacitor = window.location.protocol === 'capacitor:' || window.location.protocol === 'ionic:';
      if (!isCapacitor && !window.location.pathname.startsWith('/app')) {
        window.location.replace('/app');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
